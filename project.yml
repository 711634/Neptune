name: Clonk
options:
  bundleIdPrefix: com.clonk
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    PRODUCT_BUNDLE_IDENTIFIER: com.clonk.app

targets:
  Clonk:
    type: application
    platform: macOS
    sources:
      - path: Clonk
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_NAME: Clonk
        INFOPLIST_FILE: Clonk/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: "YES"
        ENABLE_HARDENED_RUNTIME: "NO"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
    entitlements:
      path: Clonk/Clonk.entitlements
      properties:
        com.apple.security.app-sandbox: false
