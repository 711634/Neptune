name: Neptune
options:
  bundleIdPrefix: com.neptune
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    PRODUCT_BUNDLE_IDENTIFIER: com.neptune.app

targets:
  Neptune:
    type: application
    platform: macOS
    sources:
      - path: Neptune
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_NAME: Neptune
        INFOPLIST_FILE: Neptune/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: "YES"
        ENABLE_HARDENED_RUNTIME: "NO"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
    entitlements:
      path: Neptune/Neptune.entitlements
      properties:
        com.apple.security.app-sandbox: false
